name: Data Update Scheduler

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-data:
    name: Update Mutual Fund Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data update pipeline
        run: |
          python Docs/src/phase1/pipeline.py
          python run_ui.py &
          sleep 10
          python test_phase1.py
      
      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update mutual fund data [skip ci]"
          git push
