name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
      
      - name: Run Black
        run: black --check Docs/ Tests/
      
      - name: Run isort
        run: isort --check-only Docs/ Tests/
      
      - name: Run Flake8
        run: flake8 Docs/ Tests/ --max-line-length=120

  test-phase1:
    name: Test Phase 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Phase 1 tests
        run: python Tests/Phase1/run_tests.py
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-test-results
          path: Tests/Phase1/test_results.txt

  test-phase2:
    name: Test Phase 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
